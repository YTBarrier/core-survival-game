<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        h1 {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            font-size: 5vh;
            font-family: sans-serif;
            border: 2vh solid black;
            margin: 0;
        }
    </style>
    <title>Loading CORE...</title>
    <script defer>
        async function main() {
            const response = await fetch('http://localhost:3000/menu');
            const data = await response.json();
            document.body.innerHTML = data.body;
            setTimeout(() => document.head.innerHTML = data.head, 0);
        }
        document.addEventListener('DOMContentLoaded', main);
    </script>
</head>
<body>
    <h1>Loading...</h1>
</body>
</html>
